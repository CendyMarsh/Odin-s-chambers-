<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cendy Marsh</title>
    <style>
        body { background: #000; color: #ffb1de; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; min-height: 100vh; overflow: hidden; margin: 0; }
        
        /* Видео на весь экран */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(35%);
        }

        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid #ff0080; box-shadow: 0 0 30px #ff0080; margin-bottom: 20px; object-fit: cover; z-index: 2; }
        h2 { text-shadow: 0 0 20px #ff0080; font-size: 32px; margin-bottom: 30px; text-align: center; z-index: 2; }
        
        .link-card { 
            background: rgba(0, 0, 0, 0.4); 
            width: 100%; 
            max-width: 350px; 
            margin: 12px; 
            padding: 18px; 
            border-radius: 25px; 
            text-decoration: none; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: 0.4s; 
            border: 1px solid #ff0080; 
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.3); 
            position: relative; 
            z-index: 2; 
            backdrop-filter: blur(8px);
        }
        .link-card:hover { background: #ff0080; transform: scale(1.05); box-shadow: 0 0 40px #ff0080; }
        
        .yt-svg { width: 24px; height: 24px; margin-right: 15px; fill: #ff0000; }
        .link-text { font-size: 18px; font-weight: 600; }

        .heart { position: fixed; top: -20px; color: #ff0080; user-select: none; z-index: 1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="video.mp4" type="video/mp4">
    </video>

    <img src="me.jpg" class="profile-img">
    <h2>Cendy Marsh</h2>

    <a href="https://www.youtube.com/@cendymarsh" class="link-card">
        <svg class="yt-svg" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        <span class="link-text">YouTube</span>
    </a>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }
        setInterval(createHeart, 150);
    </script>
</body>
</html>
