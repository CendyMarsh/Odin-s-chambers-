<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .link-card { background: #1e1e1e; width: 300px; margin: 10px; padding: 15px; border-radius: 15px; text-decoration: none; color: white; display: flex; align-items: center; transition: 0.3s; border: 1px solid #333; }
        .link-card:hover { background: #333; transform: scale(1.05); }
        .link-card i { font-size: 24px; margin-right: 15px; width: 30px; text-align: center; }
        .link-text { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>My Socials</h2>

    <a href="https://www.youtube.com/@cendymarsh" class="link-card">
        <i class="fab fa-youtube" style="color: #ff0000;"></i>
        <span class="link-text">YouTube</span>
    </a>

    <a href="ТВОЯ_ССЫЛКА" class="link-card">
        <i class="fab fa-vk" style="color: #0077ff;"></i>
        <span class="link-text">ВКонтакте</span>
    </a>

    <a href="ТВОЯ_ССЫЛКА" class="link-card">
        <i class="fab fa-tiktok"></i>
        <span class="link-text">TikTok</span>
    </a>

    <a href="ТВОЯ_ССЫЛКА" class="link-card">
        <i class="fas fa-video" style="color: #ff9900;"></i>

</body>
</html>
