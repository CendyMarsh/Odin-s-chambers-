<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cendy Marsh</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #0a0a0a; color: #ffb1de; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; min-height: 100vh; overflow-x: hidden; margin: 0; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid #ff0080; box-shadow: 0 0 30px #ff0080; margin-bottom: 20px; object-fit: cover; z-index: 2; }
        h2 { text-shadow: 0 0 20px #ff0080; font-size: 32px; margin-bottom: 30px; text-align: center; z-index: 2; }
        .link-card { background: rgba(255, 255, 255, 0.1); width: 100%; max-width: 350px; margin: 12px; padding: 18px; border-radius: 25px; text-decoration: none; color: white; display: flex; align-items: center; transition: 0.4s; border: 1px solid #ff0080; box-shadow: 0 0 15px rgba(255, 0, 128, 0.3); position: relative; z-index: 2; backdrop-filter: blur(5px); }
        .link-card:hover { background: #ff0080; transform: scale(1.05); box-shadow: 0 0 40px #ff0080; }
        .link-card i { font-size: 28px; margin-right: 20px; width: 40px; text-align: center; color: #ff0000; }
        .link-text { font-size: 18px; font-weight: 600; }
        .heart { position: fixed; top: -20px; color: #ff0080; user-select: none; z-index: 1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>
    <img src="me.jpg" class="profile-img">
    <h2>Cendy Marsh</h2>
    <a href="https://www.youtube.com/@cendymarsh" class="link-card">
        <i class="fab fa-youtube"></i>
        <span class="link-text">YouTube</span>
    </a>
    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }
        setInterval(createHeart, 150);
    </script>
</body>
</html>
